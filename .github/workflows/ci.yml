name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 缓存 pip 依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 安装轻量测试依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pydantic pydantic-settings python-dotenv numpy python-docx

      - name: 运行单元测试
        env:
          API_KEY: "ci-test-key"
          OLLAMA_BASE_URL: "http://localhost:11434"
          LLM_PROVIDER: "ollama"
        run: |
          pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装 Ruff
        run: pip install ruff
      - name: 代码风格检查
        run: ruff check src/ --ignore E501
