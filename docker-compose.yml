# ==========================================
# 本地开发一键启动：
#   docker compose up -d          # 后台启动所有服务
#   docker compose up qdrant -d   # 只启动 Qdrant（本地已有 Ollama 时）
#   docker compose down           # 停止并删除容器（数据不丢失）
#
# Qdrant 管理界面：http://localhost:6333/dashboard
# ==========================================

services:
  # ------------------------------------------
  # Qdrant 向量数据库（替换原 ChromaDB）
  # ------------------------------------------
  qdrant:
    # 注意：qdrant-client>=1.10（langchain-qdrant 0.2.x 的硬性要求）使用
    # query_points 接口，要求服务端 >= 1.10，老版本会报 404
    image: qdrant/qdrant:v1.15.1
    container_name: rag_qdrant
    ports:
      - "6333:6333"   # HTTP REST API + Web Dashboard
      - "6334:6334"   # gRPC（高性能批量写入用）
    volumes:
      # 数据持久化到本地目录，重建容器后数据不丢失
      - ./qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ------------------------------------------
  # Ollama 本地大模型服务
  # ------------------------------------------
  ollama:
    image: ollama/ollama
    container_name: rag_ollama
    ports:
      # 避免与 Windows 本地 Ollama（默认占 127.0.0.1:11434）冲突
      - "11435:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

  # ------------------------------------------
  # FastAPI 后端（依赖 Qdrant + Ollama 就绪）
  # ------------------------------------------
  api:
    build: .
    container_name: rag_api
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_PROVIDER=ollama
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./rag_cache:/app/rag_cache

volumes:
  ollama_models:
